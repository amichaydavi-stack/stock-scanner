name: Daily Stock Scanner

on:
  schedule:
    # Runs at 22:00 UTC = 01:00 Israel time (after US market close at 16:00 ET)
    - cron: '0 22 * * 1-5'   # Monday–Friday only
  workflow_dispatch:           # Manual trigger from GitHub UI

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run stock scanner
        env:
          EMAIL_SENDER:   ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        run: python scanner.py

      - name: Upload scan results CSV
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scan-results-${{ github.run_id }}
          path: scan_results_*.csv
          retention-days: 30
